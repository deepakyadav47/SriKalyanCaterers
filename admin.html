<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Catalog Admin — Shri Kalyan Caterers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --maroon:#5c1a24; --maroon-deep:#3d0f16; --gold:#b8894a; --gold-light:#e9d3a3;
    --cream:#faf6ee; --ink:#2a1e14; --line:#d8c9a8;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;background:var(--cream);color:var(--ink);}
  .app{max-width:960px;margin:0 auto;padding:24px 16px 80px;}
  h1.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;color:var(--maroon);font-size:2rem;margin:0 0 4px;}
  .sub{color:#7a6a52;margin:0 0 20px;font-size:.9rem;}
  .note{font-size:.8rem;color:#8a7a60;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:6px;padding:9px 14px;font-size:.85rem;font-weight:600;}
  .btn-primary{background:var(--maroon);color:#fff;}
  .btn-primary:hover{background:var(--maroon-deep);}
  .btn-ghost{background:#fff;border:1px solid var(--gold);color:var(--maroon);}
  .btn-ghost:hover{background:var(--gold-light);}
  .btn-danger{background:#fff;border:1px solid #a04b4b;color:#a04b4b;}
  .btn-danger:hover{background:#fdecec;}
  .btn-sm{padding:5px 10px;font-size:.75rem;}
  input[type=text],input[type=password],select{
    padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:.9rem;background:#fffdf9;
  }
  input:focus,select:focus{outline:2px solid var(--gold-light);border-color:var(--gold);}

  /* ---- Login gate ---- */
  #loginGate{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:50;}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:34px 30px;max-width:360px;width:90%;text-align:center;box-shadow:0 4px 18px rgba(60,30,10,.12);}
  .login-card h2{color:var(--maroon);margin:0 0 6px;font-family:'Cormorant Garamond',serif;font-style:italic;}
  .login-card p{color:#7a6a52;font-size:.85rem;margin:0 0 18px;}
  .login-card input{width:100%;margin-bottom:12px;}
  .login-card button{width:100%;}
  .login-err{color:#a04b4b;font-size:.8rem;min-height:18px;margin-top:8px;}

  /* ---- Toolbar ---- */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0;padding:14px 16px;background:#fff;border:1px solid var(--line);border-radius:10px;}
  .toolbar .status{flex:1;min-width:180px;font-size:.82rem;color:#6b4a30;}
  .save-bar{position:sticky;top:0;z-index:10;background:var(--cream);padding:10px 0;}

  /* ---- Add category ---- */
  .add-cat-row{display:flex;gap:8px;margin:18px 0;flex-wrap:wrap;}
  .add-cat-row input{flex:1;min-width:180px;}

  /* ---- Major category card ---- */
  .cat-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
  .cat-card.is-group{border-left:4px solid var(--gold);}
  .cat-head{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .cat-head input.cat-name{flex:1;min-width:160px;font-weight:700;color:var(--maroon-deep);font-size:1.05rem;border:1px solid transparent;background:transparent;padding:6px 8px;border-radius:6px;}
  .cat-head input.cat-name:hover, .cat-head input.cat-name:focus{border-color:var(--line);background:#fffdf9;}
  .type-badge{font-size:.68rem;padding:2px 8px;border-radius:10px;background:var(--gold-light);color:var(--maroon-deep);font-weight:700;white-space:nowrap;}
  .dish-count{font-size:.75rem;color:#8a7a60;white-space:nowrap;}

  .dish-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .dish-chip{
    display:flex;align-items:center;gap:6px;background:var(--gold-light);color:var(--maroon-deep);
    padding:5px 6px 5px 12px;border-radius:16px;font-size:.85rem;
  }
  .dish-chip input{
    border:none;background:transparent;font-family:inherit;font-size:.85rem;color:var(--maroon-deep);
    width:auto;min-width:40px;padding:2px 2px;
  }
  .dish-chip input:focus{outline:none;border-bottom:1px solid var(--maroon);}
  .dish-chip button{background:none;border:none;color:var(--maroon-deep);font-weight:700;cursor:pointer;padding:0 4px;font-size:.9rem;line-height:1;}

  .add-dish-row{display:flex;gap:8px;}
  .add-dish-row input{flex:1;}

  /* ---- Sub-category nested block ---- */
  .sub-block{background:#fffdf7;border:1px solid var(--gold-light);border-radius:8px;padding:12px 14px;margin:0 0 10px 14px;}
  .sub-head{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .sub-head input.sub-name{flex:1;min-width:140px;font-weight:700;color:#8a5a2b;font-size:.92rem;border:1px solid transparent;background:transparent;padding:4px 6px;border-radius:6px;}
  .sub-head input.sub-name:hover, .sub-head input.sub-name:focus{border-color:var(--gold-light);background:#fff;}
  .add-sub-row{display:flex;gap:8px;margin-top:6px;}
  .add-sub-row input{flex:1;}

  .empty-hint{color:#8a7a60;font-size:.85rem;padding:20px 0;text-align:center;}
</style>
</head>
<body>

<div id="loginGate">
  <div class="login-card">
    <h2>Catalog Admin</h2>
    <p>यह पेज केवल स्टाफ प्रबंधन के लिए है। कृपया एडमिन पासवर्ड डालें।</p>
    <input type="password" id="pwInput" placeholder="पासवर्ड" onkeydown="if(event.key==='Enter') tryLogin();">
    <button class="btn-primary" onclick="tryLogin()">Enter</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none;">
  <h1 class="title">मेन्यू कैटेलॉग एडमिन</h1>
  <p class="sub">यहाँ जो भी कैटेगरी, उप-श्रेणी और डिश जोड़ेंगे/हटाएँगे, वही मुख्य ऐप में स्टाफ को दिखेंगी।</p>

  <div class="toolbar">
    <span class="status" id="status">लोड हो रहा है…</span>
    <button class="btn-ghost" onclick="reloadFromCloud()">🔄 Reload from Cloud</button>
    <button class="btn-ghost" onclick="document.getElementById('importCatalogFile').click()">⬆ Import Catalog from File</button>
    <input type="file" id="importCatalogFile" accept=".json" style="display:none;" onchange="importCatalogFile(this.files[0])">
  </div>

  <div class="save-bar">
    <button class="btn-primary" onclick="saveToCloud()" style="width:100%;font-size:1rem;padding:12px;">💾 सभी बदलाव क्लाउड में सेव करें (Save All Changes)</button>
  </div>

  <div class="add-cat-row">
    <input type="text" id="newCatInput" placeholder="नई कैटेगरी का नाम…" onkeydown="if(event.key==='Enter') addCategory();">
    <select id="newCatType">
      <option value="flat">सीधी कैटेगरी (बिना उप-श्रेणी)</option>
      <option value="group">उप-श्रेणियों सहित (जैसे: मिठाई → बर्फी, हलवा...)</option>
    </select>
    <button class="btn-primary" onclick="addCategory()">+ नई कैटेगरी जोड़ें</button>
  </div>

  <div id="categoriesWrap"></div>
</div>

<script>
// ---------- Simple access gate ----------
// This is a soft deterrent only, NOT real security — the password lives in this
// public file's source code. Change ADMIN_PASSWORD below to something only your
// staff know. For real access control, upgrade to named staff logins later.
const ADMIN_PASSWORD = "kalyan2026";

function tryLogin(){
  const val = document.getElementById('pwInput').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    init();
  } else {
    document.getElementById('loginErr').textContent = 'गलत पासवर्ड, दोबारा कोशिश करें।';
  }
}

// ---------- Firebase (same project as the main app) ----------
const firebaseConfig = {
  apiKey: "AIzaSyDX8w1cyIGJ7-JfZYI6KRl02a8yVOAUnes",
  authDomain: "shri-kalyan-caterers.firebaseapp.com",
  projectId: "shri-kalyan-caterers",
  storageBucket: "shri-kalyan-caterers.firebasestorage.app",
  messagingSenderId: "1054069412159",
  appId: "1:1054069412159:web:d2d371ab4225a79f77838a",
  measurementId: "G-HQVE800QDN"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let authReadyResolve;
const authReady = new Promise(res => { authReadyResolve = res; });
firebase.auth().onAuthStateChanged(user=>{
  if(user){ authReadyResolve(); }
  else { firebase.auth().signInAnonymously().catch(e=>console.error('Sign-in failed', e)); }
});

function setStatus(text){ document.getElementById('status').textContent = text; }
function isGroup(entry){ return entry && !Array.isArray(entry) && entry.type === 'group'; }

// ---------- Working state (in-memory until "Save All Changes" is pressed) ----------
let catalog = {};

async function loadFromCloud(){
  await authReady;
  const doc = await db.collection('meta').doc('catalog').get();
  catalog = (doc.exists && doc.data() && Object.keys(doc.data()).length) ? doc.data() : {};
}

async function reloadFromCloud(){
  if(!confirm('क्लाउड से दोबारा लोड करें? अभी तक सेव न किए गए बदलाव खो जाएँगे।')) return;
  setStatus('लोड हो रहा है…');
  try{
    await loadFromCloud();
    render();
    setStatus('☁ क्लाउड से लोड हो गया।');
  }catch(e){
    console.error(e);
    const code = e && e.code ? e.code : 'unknown';
    setStatus(`⚠ लोड नहीं हो पाया — [${code}] ${e.message||e}`);
  }
}

function importCatalogFile(file){
  if(!file) return;
  if(Object.keys(catalog).length && !confirm('यह मौजूदा (अभी तक सेव न हुई) सूची को इस फाइल की सूची से बदल देगा। जारी रखें?')) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const parsed = JSON.parse(e.target.result);
      catalog = parsed;
      render();
      setStatus('फाइल से लोड हो गया — ध्यान से जाँचें, फिर ऊपर "Save All Changes" दबाएँ। अभी तक क्लाउड में सेव नहीं हुआ है।');
    }catch(err){
      alert('यह एक वैध कैटलॉग फाइल नहीं लगती।');
    }
  };
  reader.readAsText(file);
}

async function saveToCloud(){
  try{
    await authReady;
    await db.collection('meta').doc('catalog').set(catalog);
    setStatus('☁ सेव हो गया — मुख्य ऐप में स्टाफ को अब यही सूची दिखेगी।');
  }catch(e){
    console.error(e);
    const code = e && e.code ? e.code : 'unknown';
    const msg = e && e.message ? e.message : String(e);
    setStatus(`⚠ सेव नहीं हो पाया — [${code}] ${msg}`);
  }
}

// ---------- Major category CRUD ----------
function addCategory(){
  const input = document.getElementById('newCatInput');
  const type = document.getElementById('newCatType').value;
  const name = input.value.trim();
  if(!name) return;
  if(catalog[name]){ alert('यह कैटेगरी पहले से मौजूद है।'); return; }
  catalog[name] = (type === 'group') ? { type: 'group', subs: {} } : [];
  input.value = '';
  render();
}

function renameCategory(oldName, newName){
  newName = newName.trim();
  if(!newName || newName === oldName) { render(); return; }
  if(catalog[newName]){ alert('इस नाम की कैटेगरी पहले से मौजूद है।'); render(); return; }
  const reordered = {};
  Object.keys(catalog).forEach(k=>{
    if(k === oldName) reordered[newName] = catalog[k];
    else reordered[k] = catalog[k];
  });
  catalog = reordered;
  render();
}

function deleteCategory(name){
  if(!confirm(`"${name}" पूरी कैटेगरी (और इसकी सभी उप-श्रेणी/डिश) हमेशा के लिए हटाएँ?`)) return;
  delete catalog[name];
  render();
}

// ---------- Flat-category dish CRUD ----------
function addDish(cat){
  const input = document.getElementById('newDish__' + catKey(cat));
  const val = input.value.trim();
  if(!val) return;
  if(catalog[cat].includes(val)){ alert('यह डिश पहले से इस कैटेगरी में है।'); return; }
  catalog[cat].push(val);
  input.value = '';
  render();
}
function renameDish(cat, index, newVal){
  newVal = newVal.trim();
  if(!newVal){ catalog[cat].splice(index,1); render(); return; }
  catalog[cat][index] = newVal;
}
function deleteDish(cat, index){
  catalog[cat].splice(index,1);
  render();
}

// ---------- Sub-category CRUD (inside a grouped major category) ----------
function addSubcategory(major){
  const input = document.getElementById('newSub__' + catKey(major));
  const name = input.value.trim();
  if(!name) return;
  if(catalog[major].subs[name]){ alert('यह उप-श्रेणी पहले से मौजूद है।'); return; }
  catalog[major].subs[name] = [];
  input.value = '';
  render();
}
function renameSubcategory(major, oldSub, newSub){
  newSub = newSub.trim();
  if(!newSub || newSub === oldSub){ render(); return; }
  const subs = catalog[major].subs;
  if(subs[newSub]){ alert('इस नाम की उप-श्रेणी पहले से मौजूद है।'); render(); return; }
  const reordered = {};
  Object.keys(subs).forEach(k=>{
    if(k === oldSub) reordered[newSub] = subs[k];
    else reordered[k] = subs[k];
  });
  catalog[major].subs = reordered;
  render();
}
function deleteSubcategory(major, sub){
  if(!confirm(`उप-श्रेणी "${sub}" (और इसकी सभी डिश) हटाएँ?`)) return;
  delete catalog[major].subs[sub];
  render();
}
function addDishInSub(major, sub){
  const input = document.getElementById('newDish__' + catKey(major) + '__' + catKey(sub));
  const val = input.value.trim();
  if(!val) return;
  if(catalog[major].subs[sub].includes(val)){ alert('यह डिश पहले से इस उप-श्रेणी में है।'); return; }
  catalog[major].subs[sub].push(val);
  input.value = '';
  render();
}
function renameDishInSub(major, sub, index, newVal){
  newVal = newVal.trim();
  if(!newVal){ catalog[major].subs[sub].splice(index,1); render(); return; }
  catalog[major].subs[sub][index] = newVal;
}
function deleteDishInSub(major, sub, index){
  catalog[major].subs[sub].splice(index,1);
  render();
}

function catKey(name){
  // safe-ish DOM id from a Hindi name (doesn't need to be reversible, just unique+stable per render)
  return btoa(unescape(encodeURIComponent(name))).replace(/[^a-zA-Z0-9]/g,'');
}

function buildDishList(items, onRename, onDelete){
  const dishList = document.createElement('div');
  dishList.className = 'dish-list';
  items.forEach((dish, idx)=>{
    const chip = document.createElement('span');
    chip.className = 'dish-chip';

    const dishInput = document.createElement('input');
    dishInput.type = 'text';
    dishInput.value = dish;
    dishInput.size = Math.max(4, dish.length);
    dishInput.addEventListener('input', ()=>{ dishInput.size = Math.max(4, dishInput.value.length); });
    dishInput.addEventListener('change', ()=> onRename(idx, dishInput.value));
    chip.appendChild(dishInput);

    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.addEventListener('click', ()=> onDelete(idx));
    chip.appendChild(delBtn);

    dishList.appendChild(chip);
  });
  return dishList;
}

function render(){
  const wrap = document.getElementById('categoriesWrap');
  wrap.innerHTML = '';

  const catNames = Object.keys(catalog);
  if(!catNames.length){
    wrap.innerHTML = '<div class="empty-hint">अभी कोई कैटेगरी नहीं है। ऊपर से नई कैटेगरी जोड़ें।</div>';
    return;
  }

  catNames.forEach(cat=>{
    const entry = catalog[cat];
    const grouped = isGroup(entry);

    const card = document.createElement('div');
    card.className = 'cat-card' + (grouped ? ' is-group' : '');

    // ---- Header ----
    const head = document.createElement('div');
    head.className = 'cat-head';

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'cat-name';
    nameInput.value = cat;
    nameInput.addEventListener('change', ()=> renameCategory(cat, nameInput.value));
    head.appendChild(nameInput);

    const badge = document.createElement('span');
    badge.className = 'type-badge';
    badge.textContent = grouped ? 'उप-श्रेणियों सहित' : 'सीधी कैटेगरी';
    head.appendChild(badge);

    const count = document.createElement('span');
    count.className = 'dish-count';
    count.textContent = grouped
      ? `${Object.keys(entry.subs).length} उप-श्रेणी`
      : `${entry.length} डिश`;
    head.appendChild(count);

    const delCatBtn = document.createElement('button');
    delCatBtn.className = 'btn-danger btn-sm';
    delCatBtn.textContent = '🗑 Delete Category';
    delCatBtn.addEventListener('click', ()=> deleteCategory(cat));
    head.appendChild(delCatBtn);

    card.appendChild(head);

    if(!grouped){
      // ---- Flat category: dish chips + add-dish row ----
      card.appendChild(buildDishList(entry,
        (idx, val)=> renameDish(cat, idx, val),
        (idx)=> deleteDish(cat, idx)
      ));

      const addRow = document.createElement('div');
      addRow.className = 'add-dish-row';
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.id = 'newDish__' + catKey(cat);
      addInput.placeholder = 'नई डिश का नाम…';
      addInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') addDish(cat); });
      const addBtn = document.createElement('button');
      addBtn.className = 'btn-ghost btn-sm';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', ()=> addDish(cat));
      addRow.appendChild(addInput);
      addRow.appendChild(addBtn);
      card.appendChild(addRow);

    } else {
      // ---- Grouped category: one nested block per sub-category ----
      Object.keys(entry.subs).forEach(sub=>{
        const subBlock = document.createElement('div');
        subBlock.className = 'sub-block';

        const subHead = document.createElement('div');
        subHead.className = 'sub-head';

        const subNameInput = document.createElement('input');
        subNameInput.type = 'text';
        subNameInput.className = 'sub-name';
        subNameInput.value = sub;
        subNameInput.addEventListener('change', ()=> renameSubcategory(cat, sub, subNameInput.value));
        subHead.appendChild(subNameInput);

        const subCount = document.createElement('span');
        subCount.className = 'dish-count';
        subCount.textContent = `${entry.subs[sub].length} डिश`;
        subHead.appendChild(subCount);

        const delSubBtn = document.createElement('button');
        delSubBtn.className = 'btn-danger btn-sm';
        delSubBtn.textContent = '🗑 उप-श्रेणी हटाएँ';
        delSubBtn.addEventListener('click', ()=> deleteSubcategory(cat, sub));
        subHead.appendChild(delSubBtn);

        subBlock.appendChild(subHead);

        subBlock.appendChild(buildDishList(entry.subs[sub],
          (idx, val)=> renameDishInSub(cat, sub, idx, val),
          (idx)=> deleteDishInSub(cat, sub, idx)
        ));

        const addRow = document.createElement('div');
        addRow.className = 'add-dish-row';
        const addInput = document.createElement('input');
        addInput.type = 'text';
        addInput.id = 'newDish__' + catKey(cat) + '__' + catKey(sub);
        addInput.placeholder = 'नई डिश का नाम…';
        addInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') addDishInSub(cat, sub); });
        const addBtn = document.createElement('button');
        addBtn.className = 'btn-ghost btn-sm';
        addBtn.textContent = '+ Add';
        addBtn.addEventListener('click', ()=> addDishInSub(cat, sub));
        addRow.appendChild(addInput);
        addRow.appendChild(addBtn);
        subBlock.appendChild(addRow);

        card.appendChild(subBlock);
      });

      // ---- Add new sub-category row ----
      const addSubRow = document.createElement('div');
      addSubRow.className = 'add-sub-row';
      const addSubInput = document.createElement('input');
      addSubInput.type = 'text';
      addSubInput.id = 'newSub__' + catKey(cat);
      addSubInput.placeholder = 'नई उप-श्रेणी का नाम…';
      addSubInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') addSubcategory(cat); });
      const addSubBtn = document.createElement('button');
      addSubBtn.className = 'btn-ghost btn-sm';
      addSubBtn.textContent = '+ नई उप-श्रेणी जोड़ें';
      addSubBtn.addEventListener('click', ()=> addSubcategory(cat));
      addSubRow.appendChild(addSubInput);
      addSubRow.appendChild(addSubBtn);
      card.appendChild(addSubRow);
    }

    wrap.appendChild(card);
  });
}

async function init(){
  setStatus('लोड हो रहा है…');
  try{
    await loadFromCloud();
    render();
    setStatus(Object.keys(catalog).length
      ? '☁ क्लाउड से लोड हो गया।'
      : 'अभी कोई कैटलॉग सेव नहीं है।');
  }catch(e){
    console.error(e);
    const code = e && e.code ? e.code : 'unknown';
    setStatus(`⚠ लोड नहीं हो पाया — [${code}] ${e.message||e}`);
  }
}
</script>
</body>
</html>
