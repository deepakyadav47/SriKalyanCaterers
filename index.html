<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Menu Card Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --maroon:#5c1a24;
    --maroon-deep:#3d0f16;
    --gold:#b8894a;
    --gold-light:#e9d3a3;
    --cream:#faf6ee;
    --ink:#2a1e14;
    --line:#d8c9a8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;
    background:var(--cream); color:var(--ink);
  }
  .app{max-width:1000px;margin:0 auto;padding:24px 16px 80px;}
  .top-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:6px;}
  h1.title{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
    color:var(--maroon); font-size:2.1rem; margin:0 0 4px;
  }
  .sub{color:#7a6a52;margin:0 0 20px;font-size:.95rem;}
  .btn-reset-top{background:#fff;border:1.5px solid #a04b4b;color:#a04b4b;padding:9px 16px;border-radius:6px;font-weight:700;white-space:nowrap;}
  .btn-reset-top:hover{background:#fdecec;}
  .order-badge{
    background:var(--maroon-deep);color:#f4e6c8;padding:9px 16px;border-radius:6px;font-weight:700;
    font-size:.85rem;white-space:nowrap;border:1px solid var(--gold);align-self:flex-start;
  }
  .card{
    background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:18px 20px; margin-bottom:18px; box-shadow:0 1px 3px rgba(60,30,10,.06);
  }
  .card h2{
    font-size:1rem; letter-spacing:.03em; color:var(--maroon); margin:0 0 14px;
    display:flex; align-items:center; gap:8px; text-transform:uppercase; font-weight:700;
  }
  .card h2::before{content:"";width:5px;height:16px;background:var(--gold);border-radius:2px;display:inline-block;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  label{display:block;font-size:.78rem;color:#7a6a52;margin-bottom:4px;font-weight:600;}
  input[type=text],input[type=number],input[type=date],select,textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:6px;
    font-family:inherit;font-size:.95rem;background:#fffdf9;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold-light);border-color:var(--gold);}
  .field{margin-bottom:12px;}
  .day-block{border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px;background:#fffdf7;}
  .day-block-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
  .section-block{border-left:3px solid var(--gold);background:#fff;border-radius:0 6px 6px 0;padding:12px 14px;margin-bottom:10px;}
  .section-head{display:flex;gap:10px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;}
  .section-head .field{flex:1;min-width:160px;margin-bottom:0;}
  .section-actions{display:flex;gap:8px;align-items:center;}
  .cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .cat-tab{
    padding:5px 10px;border:1px solid var(--line);border-radius:16px;font-size:.78rem;
    cursor:pointer;background:#fff;color:#7a6a52;
  }
  .cat-tab.active{background:var(--maroon);color:#fff;border-color:var(--maroon);}
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px 10px;max-height:220px;overflow:auto;padding:8px;border:1px solid var(--line);border-radius:6px;background:#fffefb;}
  .item-opt{display:flex;align-items:center;gap:6px;font-size:.85rem;}
  .item-opt input{width:auto;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip{background:var(--gold-light);color:var(--maroon-deep);padding:4px 10px;border-radius:14px;font-size:.8rem;display:flex;gap:6px;align-items:center;}
  .chip button{border:none;background:none;color:var(--maroon-deep);cursor:pointer;font-weight:700;padding:0;line-height:1;}
  button{
    font-family:inherit;cursor:pointer;border:none;border-radius:6px;padding:8px 14px;font-size:.85rem;font-weight:600;
  }
  .btn-primary{background:var(--maroon);color:#fff;}
  .btn-primary:hover{background:var(--maroon-deep);}
  .btn-ghost{background:#fff;border:1px solid var(--gold);color:var(--maroon);}
  .btn-ghost:hover{background:var(--gold-light);}
  .btn-reset{background:#fff;border:1px solid #a04b4b;color:#a04b4b;padding:4px 10px;font-size:.75rem;}
  .btn-reset:hover{background:#fdecec;}
  .icon-btn{background:none;border:none;color:#a04b4b;font-size:1rem;cursor:pointer;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;}
  .note{font-size:.78rem;color:#8a7a60;margin-top:6px;}

  /* ---- Preview / print output ---- */
  #previewWrap{margin-top:26px;}
  .menu-page{
    background:#fff;border:2.5px solid var(--maroon-deep);border-radius:2px;
    padding:34px 40px;margin-bottom:26px;position:relative;
  }
  .menu-page::before{
    content:"";position:absolute;inset:7px;border:1px solid var(--gold);pointer-events:none;
  }
  .corner{position:absolute;width:46px;height:46px;pointer-events:none;}
  .corner svg{width:100%;height:100%;}
  .corner-tl{top:10px;left:10px;}
  .corner-tr{top:10px;right:10px;transform:scaleX(-1);}
  .corner-bl{bottom:10px;left:10px;transform:scaleY(-1);}
  .corner-br{bottom:10px;right:10px;transform:scale(-1,-1);}

  .om-line{text-align:center;font-size:.85rem;color:var(--maroon);margin-bottom:6px;letter-spacing:.04em;}
  .emblem{display:flex;justify-content:center;margin-bottom:6px;}
  .emblem svg{width:44px;height:44px;}
  .biz-name{text-align:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:2.1rem;color:var(--maroon-deep);margin:0 0 2px;}
  .biz-mob{text-align:center;font-size:.85rem;color:#5c1a24;margin-bottom:14px;font-weight:600;}
  .head-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:.92rem;margin-bottom:8px;gap:10px;}
  .head-row .left,.head-row .right{width:30%;font-weight:700;color:var(--maroon-deep);}
  .head-row .right{text-align:right;}
  .head-row .center{text-align:center;width:40%;font-weight:700;color:var(--maroon-deep);}
  .head-row .center .venue-sub{font-weight:700;font-size:.85rem;color:#6b4a30;}
  .order-tag{font-weight:600;font-size:.72rem;color:#8a7a60;margin-top:3px;letter-spacing:.02em;}
  .divider{display:flex;align-items:center;gap:10px;margin:10px 0 16px;}
  .divider .ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .divider svg{width:16px;height:16px;flex-shrink:0;}
  .menu-title-wrap{text-align:center;margin:2px 0 18px;}
  .menu-title{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:1.35rem;
    border-top:1px solid var(--maroon-deep);border-bottom:1px solid var(--maroon-deep);
    display:inline-flex;align-items:center;gap:10px;padding:4px 26px;color:var(--maroon-deep);
  }
  .menu-title svg{width:16px;height:16px;}

  .sections-flow{display:block;}
  .sec{margin-bottom:18px;width:100%;}
  .sec > h3{
    font-size:1.05rem;color:var(--maroon-deep);margin:0 0 10px;font-weight:700;
    display:flex;align-items:center;gap:7px;border-bottom:1.5px solid var(--gold);padding-bottom:5px;
    break-after:avoid;
  }
  .sec > h3 svg{width:15px;height:15px;flex-shrink:0;}
  .sec > h3 .mem{font-size:.82rem;font-weight:700;color:#6b4a30;}
  .cat-group{margin:0 0 10px 4px;break-inside:avoid;}
  .cat-group h4{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:.86rem;
    color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin:0 0 4px;
    break-after:avoid;
  }
  .cat-group ul{list-style:none;margin:0;padding:0;column-count:2;column-gap:34px;}
  .cat-group li{font-size:.9rem;break-inside:avoid;margin-bottom:6px;padding-right:6px;}
  .cat-group li::before{content:"◆ ";color:var(--gold);font-size:.65rem;vertical-align:middle;}
  .footer-line{border-top:1px solid var(--line);margin-top:14px;padding-top:8px;font-size:.86rem;font-weight:700;color:var(--maroon-deep);text-align:center;}

  @media print{
    body{background:#fff;}
    .app > *:not(#previewWrap){display:none !important;}
    .toolbar{display:none !important;}
    .menu-page{break-after:page;box-shadow:none;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div>
      <h1 class="title">Menu Card Generator</h1>
      <p class="sub">Tick the dishes served at each meal — a client-ready menu card generates instantly, formatted the same way as your printed sheets.</p>
    </div>
    <div id="orderIdBadge" class="order-badge">ऑर्डर आईडी: —</div>
  </div>

  <div class="card" style="padding:14px 20px;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
      <div class="field" style="margin:0;flex:1;min-width:180px;">
        <label>ऑर्डर आईडी से खोजें</label>
        <input type="text" id="orderIdSearch" placeholder="जैसे ORD-0007 या 7" onkeydown="if(event.key==='Enter') searchOrderById();">
      </div>
      <button class="btn-ghost" onclick="searchOrderById()">🔍 खोजें</button>
      <select id="draftSelect" onchange="onDraftSelect(this.value)" style="padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:.85rem;background:#fffdf9;max-width:220px;">
        <option value="">📂 सभी सेव किए ऑर्डर…</option>
      </select>
      <button class="btn-ghost" onclick="saveDraft()">💾 Save Draft</button>
      <button class="btn-reset" style="padding:9px 12px;" onclick="deleteSelectedDraft()">🗑 Delete Selected</button>
      <button class="btn-reset-top" onclick="resetAll()">↺ Reset — New Client</button>
    </div>
  </div>

  <div class="top-bar" style="margin-top:-6px;">
    <p class="note" id="storageStatus" style="margin:0;">कनेक्ट हो रहा है…</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-ghost" onclick="refreshCatalog()">🔄 Refresh Dish List</button>
      <button class="btn-ghost" onclick="exportBackup()">⬇ Backup All Clients</button>
      <button class="btn-ghost" onclick="document.getElementById('importFile').click()">⬆ Restore Backup</button>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importBackup(this.files[0])">
    </div>
  </div>

  <div class="card">
    <h2>Business & Client Details</h2>
    <div class="grid2">
      <div class="field"><label>Business Name</label><input id="bizName" type="text" autocomplete="off" value="श्री कल्याण कैटर्स" readonly style="background:#f3ede1;color:#6b4a30;cursor:not-allowed;"></div>
      <div class="field"><label>Mobile Numbers</label><input id="bizMob" type="text" autocomplete="off" value="Mob. : 9829730932, 9461456136" readonly style="background:#f3ede1;color:#6b4a30;cursor:not-allowed;"></div>
      <div class="field"><label>Client Name</label><input id="clientName" type="text" autocomplete="off" placeholder=""></div>
      <div class="field"><label>Venue Name</label><input id="venueName" type="text" autocomplete="off" placeholder=""></div>
      <div class="field" style="grid-column:1/-1;"><label>Venue Address</label><input id="venueAddr" type="text" autocomplete="off" placeholder=""></div>
    </div>
  </div>

  <div id="daysWrap"></div>

  <div class="toolbar">
    <button class="btn-ghost" onclick="addDay()">+ Add Date</button>
    <button class="btn-primary" onclick="renderPreview()">Generate Menu Card</button>
  </div>

  <div id="previewWrap"></div>
</div>

// ---------- Sequential Order ID (atomic across every device via a Firestore transaction) ----------
async function nextOrderId(){
  await authReady;
  const seqRef = db.collection('meta').doc('orderSeq');
  const newSeq = await db.runTransaction(async (tx)=>{
    const doc = await tx.get(seqRef);
    const current = doc.exists ? (doc.data().seq || 0) : 0;
    const next = current + 1;
    tx.set(seqRef, { seq: next });
    return next;
  });
  return 'ORD-' + String(newSeq).padStart(4,'0');
}

async function getCurrentSeq(){
  await authReady;
  const doc = await db.collection('meta').doc('orderSeq').get();
  return doc.exists ? (doc.data().seq || 0) : 0;
}
async function setSeqIfHigher(seq){
  await authReady;
  const current = await getCurrentSeq();
  if(seq > current){
    await db.collection('meta').doc('orderSeq').set({ seq });
  }
}

function rebuildAllCatTabs(){
  document.querySelectorAll('.section-block').forEach(secEl=>{
    const activeCat = secEl.querySelector('.item-grid').dataset.currentCat;
    const tabsWrap = secEl.querySelector('.cat-tabs');
    const sid = secEl.id;
    tabsWrap.innerHTML = Object.keys(CATALOG).map(c=>
      `<div class="cat-tab ${c===activeCat?'active':''}" data-cat="${c}" onclick="switchCat('${sid}','${c}')">${c}</div>`
    ).join('');
  });
}

function switchCat(sid, cat){
  const secEl = document.getElementById(sid);
  secEl.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active', t.dataset.cat===cat));
  const grid = secEl.querySelector('.item-grid');
  grid.dataset.currentCat = cat;
  const chosen = getChosenSet(sid);
  grid.innerHTML = CATALOG[cat].map(item=>{
    const checked = chosen.has(item) ? 'checked' : '';
    return `<label class="item-opt"><input type="checkbox" value="${item}" onchange="toggleChip('${sid}', this)" ${checked}> ${item}</label>`;
  }).join('');
}

function getChosenSet(sid){
  const secEl = document.getElementById(sid);
  const set = new Set();
  secEl.querySelectorAll('.chip').forEach(c=> set.add(c.dataset.item));
  return set;
}

function toggleChip(sid, checkbox){
  const secEl = document.getElementById(sid);
  const chipsWrap = secEl.querySelector('.chips');
  const item = checkbox.value;
  const cat = checkbox.closest('.item-grid').dataset.currentCat;
  if(checkbox.checked){
    if(![...chipsWrap.children].some(c=>c.dataset.item===item)){
      const chip = document.createElement('span');
      chip.className='chip'; chip.dataset.item=item; chip.dataset.cat=cat;
      chip.innerHTML = `${item} <button onclick="removeChip('${sid}','${item.replace(/'/g,"\\'")}')">×</button>`;
      chipsWrap.appendChild(chip);
    }
  } else {
    removeChip(sid, item, true);
  }
}

function removeChip(sid, item, skipUncheck){
  const secEl = document.getElementById(sid);
  const chipsWrap = secEl.querySelector('.chips');
  [...chipsWrap.children].forEach(c=>{ if(c.dataset.item===item) c.remove(); });
  if(!skipUncheck){
    secEl.querySelectorAll('.item-grid input[type=checkbox]').forEach(cb=>{
      if(cb.value===item) cb.checked=false;
    });
  }
}

function resetSection(sid){
  const secEl = document.getElementById(sid);
  secEl.querySelector('.chips').innerHTML='';
  secEl.querySelectorAll('.item-grid input[type=checkbox]').forEach(cb=> cb.checked=false);
}

function formatHindiDate(isoDate){
  if(!isoDate) return '—';
  const [y,m,d] = isoDate.split('-').map(Number);
  if(!y||!m||!d) return isoDate;
  return `${d} ${HINDI_MONTHS[m-1]} ${y}`;
}

function collectState(){
  const days = [...document.querySelectorAll('.day-block')].map(dayEl=>{
    const date = dayEl.querySelector('.dayDate').value;
    const sections = [...dayEl.querySelectorAll('.section-block')].map(secEl=>{

      const members = secEl.querySelector('.secMembers').value;
      const items = [...secEl.querySelectorAll('.chip')].map(c=>({item:c.dataset.item, cat:c.dataset.cat}));
      return {name, members, items};
    });
    return {date, sections};
  });
  return {

    bizName: document.getElementById('bizName').value,
    bizMob: document.getElementById('bizMob').value,
    clientName: document.getElementById('clientName').value,
    venueName: document.getElementById('venueName').value,
    venueAddr: document.getElementById('venueAddr').value,
    days,
    savedAt: new Date().toISOString()
  };

function applyState(state){
  currentOrderId = state.orderId || null;
  updateOrderIdBadge();
  document.getElementById('bizName').value = state.bizName || 'श्री कल्याण कैटर्स';
  document.getElementById('bizMob').value = state.bizMob || '';
  document.getElementById('clientName').value = state.clientName || '';
  document.getElementById('venueName').value = state.venueName || '';
  document.getElementById('venueAddr').value = state.venueAddr || '';
  document.getElementById('daysWrap').innerHTML='';
  document.getElementById('previewWrap').innerHTML='';

  (state.days||[]).forEach(d=>{
    const dayId = addDay();
    const dayEl = document.getElementById(dayId);
    dayEl.querySelector('.dayDate').value = d.date || '';
    dayEl.querySelector('.sectionsHolder').innerHTML=''; // clear the auto-created first section, rebuild explicitly

    (d.sections||[]).forEach(sec=>{
      addSection(dayId);
      const secEl = dayEl.querySelector('.sectionsHolder').lastElementChild;
      secEl.querySelector('.secName').value = sec.name || '';
      secEl.querySelector('.secMembers').value = sec.members || '';

      (sec.items||[]).forEach(it=>{
        if(CATALOG[it.cat] && CATALOG[it.cat].includes(it.item)){
          switchCat(secEl.id, it.cat);
          const cb = [...secEl.querySelectorAll('.item-grid input[type=checkbox]')].find(c=>c.value===it.item);
          if(cb){ cb.checked = true; toggleChip(secEl.id, cb); return; }
        }
        // fallback: item no longer in catalog for some reason — still restore it as a chip
        const chipsWrap = secEl.querySelector('.chips');
        const chip = document.createElement('span');
        chip.className='chip'; chip.dataset.item=it.item; chip.dataset.cat=it.cat;
        chip.innerHTML = `${it.item} <button onclick="removeChip('${secEl.id}','${it.item.replace(/'/g,"\\'")}')">×</button>`;
        chipsWrap.appendChild(chip);
      });
    });
  });
}

// Saves the current form. If this is a brand-new order (never saved before), a new
// sequential Order ID is generated. If an existing order was loaded (via search or the
// dropdown), the SAME Order ID is reused and its saved file is simply overwritten.
async function saveDraftSilent(){
  if(!currentOrderId){
    currentOrderId = await nextOrderId();
    updateOrderIdBadge();
  }
  const state = collectState();
  try{
    await writeOrder(currentOrderId, state);
    return currentOrderId;
  }catch(e){ console.error('Save failed', e); return null; }
}

async function saveDraft(){
  const wasNew = !currentOrderId;
  const id = await saveDraftSilent();
  if(id){
    await loadDraftList(id);
    alert(wasNew
      ? `सेव हो गया। नया ऑर्डर आईडी: ${id}\nअगली बार इसी आईडी से इस ऑर्डर को खोज कर बदलाव कर सकते हैं।`
      : `ऑर्डर ${id} अपडेट हो गया।`);
  } else {

  }
}

async function loadDraftList(selectId){
  const sel = document.getElementById('draftSelect');
  let options = '<option value="">📂 सभी सेव किए ऑर्डर…</option>';
  try{
    const orders = await listOrders();
    orders
      .sort((a,b)=> (b.savedAt||'').localeCompare(a.savedAt||'')) // most recently saved first
      .forEach(st=>{
        const label = `${st.orderId||'—'} · ${st.clientName||'—'}${st.venueName ? ' · '+st.venueName : ''}`;
        options += `<option value="${st.orderId}">${label}</option>`;
      });
  }catch(e){ /* no orders saved yet */ }
  sel.innerHTML = options;
  if(selectId) sel.value = selectId;
}

async function exportBackup(){
  try{
    const orders = await listOrders();
    const drafts = {};
    orders.forEach(st=>{ if(st.orderId) drafts[st.orderId] = st; });
    const seq = await getCurrentSeq();

    const backup = { type:'menu_generator_backup', exportedAt: new Date().toISOString(), drafts, seq };
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `menu_generator_backup_${stamp}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    alert('Could not create backup — please try again.');
  }
}

function importBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const backup = JSON.parse(e.target.result);
      if(!backup || backup.type!=='menu_generator_backup') throw new Error('invalid file');
      const orderIds = Object.keys(backup.drafts||{});
      for(const id of orderIds){
        await writeOrder(id, backup.drafts[id]);
      }
      if(backup.seq){ await setSeqIfHigher(backup.seq); }
      await loadDraftList();
      alert(`Restored ${orderIds.length} saved order(s) from backup.`);
    }catch(err){
      alert('This file could not be read as a valid backup.');
    }
  };
  reader.readAsText(file);
}

// Builds an actual PDF file (not just the print dialog) from the generated menu card(s)
// and hands it to the device's native share sheet — WhatsApp, Telegram, Print, Save, etc.
// Each date's card is sliced into as many A4-shaped pages as its content needs, so long
// menus still paginate correctly instead of being squeezed into one tall image.
async function shareMenu(){
  const pageEls = [...document.querySelectorAll('#previewWrap .menu-page')];
  if(!pageEls.length){ alert('पहले "Generate Menu Card" दबाएँ।'); return; }
  if(typeof html2canvas === 'undefined' || !window.jspdf){
    alert('शेयर फ़ीचर लोड नहीं हो पाया — कृपया इंटरनेट कनेक्शन जाँचें और पेज रीलोड करें।');
    return;
  }

  const btn = document.getElementById('shareMenuBtn');
  const original = btn.textContent;
  btn.textContent = '⏳ तैयार हो रहा है…';
  btn.disabled = true;

  try{
    if(document.fonts && document.fonts.ready) await document.fonts.ready;
    const { jsPDF } = window.jspdf;
    let pdf = null;
    const A4_RATIO = 0.70707; // width / height

    for(const pageEl of pageEls){
      const canvas = await html2canvas(pageEl, { scale:2, backgroundColor:'#ffffff', useCORS:true });
      const W = canvas.width, H = canvas.height;
      const pageHpx = Math.round(W / A4_RATIO);
      let y = 0;
      while(y < H){
        const sliceH = Math.min(pageHpx, H - y);
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = W; sliceCanvas.height = sliceH;
        const ctx = sliceCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,sliceH);
        ctx.drawImage(canvas, 0, y, W, sliceH, 0, 0, W, sliceH);
        const imgData = sliceCanvas.toDataURL('image/jpeg', 0.92);

        if(!pdf){
          pdf = new jsPDF({ unit:'px', format:[W, pageHpx] });
        } else {
          pdf.addPage([W, pageHpx], 'p');
        }
        pdf.addImage(imgData, 'JPEG', 0, 0, W, sliceH);
        y += sliceH;
      }
    }

    const fileName = `Menu_${currentOrderId || 'card'}.pdf`;
    const pdfBlob = pdf.output('blob');
    const file = new File([pdfBlob], fileName, {type:'application/pdf'});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], title:'मेन्यू कार्ड', text:'श्री कल्याण कैटर्स — मेन्यू कार्ड' });
    } else {
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      alert('इस ब्राउज़र में सीधा शेयर सपोर्ट नहीं है, इसलिए PDF डाउनलोड कर दी गई है — अब इसे WhatsApp/Telegram पर मैन्युअली शेयर करें।');
    }
  }catch(e){
    if(e && e.name === 'AbortError'){ /* user cancelled the share sheet — not an error */ }
    else { console.error(e); alert('शेयर करने में समस्या आई, कृपया दोबारा कोशिश करें।'); }
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

async function renderPreview(){
  const bizName = document.getElementById('bizName').value;
  const bizMob = document.getElementById('bizMob').value;
  const clientName = document.getElementById('clientName').value;
  const venueName = document.getElementById('venueName').value;
  const venueAddr = document.getElementById('venueAddr').value;
  const catOrder = Object.keys(CATALOG);

  let pagesHtml = '';
  document.querySelectorAll('.day-block').forEach(dayEl=>{
    const rawDate = dayEl.querySelector('.dayDate').value;
    const date = formatHindiDate(rawDate);
    let secsHtml = '';
    dayEl.querySelectorAll('.section-block').forEach(secEl=>{
      const name = secEl.querySelector('.secName').value;
      const members = secEl.querySelector('.secMembers').value;
      const chips = [...secEl.querySelectorAll('.chip')];
      if(chips.length===0) return;

      // group chosen items by category, preserving catalog category order
      const grouped = {};
      chips.forEach(c=>{
        const cat = c.dataset.cat || 'अन्य';
        if(!grouped[cat]) grouped[cat]=[];
        grouped[cat].push(c.dataset.item);
      });
      const orderedCats = [...catOrder.filter(c=>grouped[c]), ...Object.keys(grouped).filter(c=>!catOrder.includes(c))];

      let groupsHtml = orderedCats.map(cat=>`
        <div class="cat-group">
          <h4>${cat}</h4>
          <ul>${grouped[cat].map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>`).join('');

      secsHtml += `
        <div class="sec">
          <h3>${leafIconSVG()} ${name} ${members ? `<span class="mem">( ${members} मैम्बर )</span>` : ''}</h3>
          ${groupsHtml}
        </div>`;
    });
    if(!secsHtml) return;
    pagesHtml += `
      <div class="menu-page">
        <div class="corner corner-tl">${cornerIconSVG()}</div>
        <div class="corner corner-tr">${cornerIconSVG()}</div>
        <div class="corner corner-bl">${cornerIconSVG()}</div>
        <div class="corner corner-br">${cornerIconSVG()}</div>

        <div class="om-line">॥ श्री गणेशाय नम: ॥</div>
        <div class="emblem">${emblemSVG()}</div>
        <div class="biz-name">${bizName}</div>
        <div class="biz-mob">${bizMob}</div>
        <div class="head-row">
          <div class="left">${clientName}</div>
          <div class="center">${venueName}<div class="venue-sub">${venueAddr}</div></div>
          <div class="right">${date}<div class="order-tag">Order: ${currentOrderId || '—'}</div></div>
        </div>
        <div class="divider">
          <div class="ln"></div>${dividerIconSVG()}<div class="ln"></div>
        </div>
        <div class="menu-title-wrap">
          <div class="menu-title">${titleFlourishSVG()} Menu ${titleFlourishSVG()}</div>
        </div>
        <div class="sections-flow">${secsHtml}</div>
        <div class="footer-line">${bizName} &nbsp;•&nbsp; ${bizMob}</div>
      </div>`;
  });

  const wrap = document.getElementById('previewWrap');
  if(!pagesHtml){
    wrap.innerHTML = '<p class="note">Add at least one date, a meal period, and tick some items first.</p>';
    return;
  }
  wrap.innerHTML = pagesHtml + `
    <div class="toolbar">
      <button class="btn-primary" onclick="window.print()">🖨 Print / Save as PDF</button>
      <button class="btn-primary" id="shareMenuBtn" onclick="shareMenu()">📤 मेन्यू शेयर करें</button>
    </div>`;
  wrap.scrollIntoView({behavior:'smooth'});

  // Auto-save so this client's menu can be reopened and edited later without re-selecting everything
  const key = await saveDraftSilent();
  if(key) loadDraftList(key);
}

// init
(async function init(){
  await loadCatalog();
  await loadDraftList();
  await startNewOrder();
})();
</script>
